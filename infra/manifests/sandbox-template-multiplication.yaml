# SandboxTemplate for the multiplication example (single fixed image; gVisor; no API token).
# 0.5.x model: this template is referenced by sandbox-warmpool-multiplication.yaml (a SandboxWarmPool),
# and the SDK spawns via SandboxClient.create_sandbox(warmpool="multiplication-pool") -> claim ->
# warmpool -> THIS template -> Sandbox, then commands.run hits the in-image :8888 server. Apply BOTH:
#   kubectl apply -f infra/manifests/sandbox-template-multiplication.yaml
#   kubectl apply -f infra/manifests/sandbox-warmpool-multiplication.yaml
# (Opposite of the mini-swe backend, which uses a per-instance raw Sandbox CR + pod-exec.)
#
# Requires the extensions CRDs (SandboxTemplate/SandboxClaim/SandboxWarmPool) — installed by default
# (INSTALL_AGENT_SANDBOX_EXTENSIONS=true in infra/.env, applied by 04-install-agent-sandbox.sh).
#
# THE RUNTIME IMAGE: commands.run POSTs to an in-image :8888 server (POST /execute ->
# {stdout, stderr, exit_code}; GET / for readiness). Upstream expects you to BUILD that server from
# agent-sandbox's examples/python-runtime-sandbox/ and push it to a registry. To avoid a Docker build,
# this template runs a stock `python:3.12-slim` and mounts an equivalent stdlib server from the
# `sandbox-runtime-server` ConfigMap (infra/manifests/sandbox-runtime-server-configmap.yaml) — apply
# that ConfigMap FIRST. Any image/command serving the same /execute contract on :8888 works; to use a
# real built image instead, drop the volume + command below and set `image:` to your registry tag.
#
# GVK: v1beta1 — matches the pinned SDK (k8s-agent-sandbox>=0.5.0,<0.6, whose constants + the
# SandboxClaim it writes are v1beta1). The cluster's AGENT_SANDBOX_VERSION controller must serve v1beta1
# (true for `latest`).
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: multiplication-template
  namespace: skyrl-sandboxes
spec:
  podTemplate:
    spec:
      # gVisor isolation + pin to the sandbox pool (same posture as the mini-swe backend).
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      # Untrusted code must NOT receive a Kubernetes API token.
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: sandbox
          image: python:3.12-slim # stock image; the :8888 server is the ConfigMap-mounted stdlib script
          # Run the runtime server mounted from the sandbox-runtime-server ConfigMap (see header).
          command: ["python3", "/opt/runtime/server.py"]
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: runtime-server
              mountPath: /opt/runtime
          # Gate readiness on the server being up, so a warm pod is only adopted once commands.run can
          # connect (mirrors the upstream python-sandbox-template).
          readinessProbe:
            httpGet:
              path: "/"
              port: 8888
            initialDelaySeconds: 0
            periodSeconds: 1
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
              ephemeral-storage: "4Gi"
      volumes:
        - name: runtime-server
          configMap:
            name: sandbox-runtime-server   # infra/manifests/sandbox-runtime-server-configmap.yaml
